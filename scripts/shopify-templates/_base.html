<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="x-apple-disable-message-reformatting" />
    <meta name="color-scheme" content="dark light" />
    <meta name="supported-color-schemes" content="dark light" />
    <title>{{TITLE}}</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #0a0a0a;
      color: #e5e5e5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    "
  >
    <div
      style="
        display: none;
        max-height: 0;
        overflow: hidden;
        font-size: 1px;
        line-height: 1px;
        color: #0a0a0a;
        opacity: 0;
      "
    >
      {{PREHEADER}}
    </div>

    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      border="0"
      style="background-color: #0a0a0a;"
    >
      <tr>
        <td align="center" style="padding: 32px 16px;">
          <table
            role="presentation"
            width="600"
            cellpadding="0"
            cellspacing="0"
            border="0"
            style="
              width: 100%;
              max-width: 600px;
              background-color: #101210;
              border: 1px solid #1a241a;
            "
          >
            <!-- HEADER -->
            <tr>
              <td style="padding: 28px 32px 20px 32px; border-bottom: 1px solid #1a241a;">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                  <tr>
                    <td>
                      <img
                        src="https://cdn.shopify.com/s/files/1/1032/6641/9033/files/opendrone-wordmark-1200.png?v=1776537979"
                        alt="OpenDrone"
                        width="160"
                        height="29"
                        style="display: block; border: 0; outline: none; text-decoration: none; height: 29px; width: 160px;"
                      />
                    </td>
                    <td
                      align="right"
                      style="
                        font-family: 'JetBrains Mono', 'Courier New', monospace;
                        font-size: 12px;
                        letter-spacing: 0.2em;
                        text-transform: uppercase;
                        color: #a0a0a0;
                      "
                    >
                      {{BADGE}}
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- BODY -->
            {{BODY_SLOT}}

            <!-- FOOTER -->
            <tr>
              <td
                style="
                  padding: 24px 32px;
                  border-top: 1px solid #1a241a;
                  font-family: Helvetica, Arial, sans-serif;
                  font-size: 12px;
                  line-height: 1.6;
                  color: #a0a0a0;
                "
              >
                <p style="margin: 0 0 12px 0;">
                  OpenDrone &mdash; open source drone electronics designed in
                  Belgium.
                </p>
                <p style="margin: 0 0 16px 0;">
                  Incutec BV &middot; Stapelhuisstraat 15, 3000 Leuven, Belgium
                </p>
                <p
                  style="
                    margin: 0;
                    font-family: 'JetBrains Mono', 'Courier New', monospace;
                    font-size: 12px;
                    letter-spacing: 0.1em;
                  "
                >
                  <a
                    href="{{ shop.url }}"
                    style="color: #b8922e; text-decoration: none;"
                    >opendrone.be</a
                  >
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
