# Daily sweep of stale support tickets. Hits /api/support/cleanup with
# the bearer token; the route deletes Discord threads + index entries
# for tickets that are closed or have had no activity for 7+ days.
#
# Required repo secret: SUPPORT_CLEANUP_SECRET (must match the env var
# of the same name in Oxygen Production).

name: Support cleanup

on:
  schedule:
    # 03:17 UTC every day — picked off-hours so a slow run can't
    # interfere with normal customer-facing traffic.
    - cron: '17 3 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit cleanup endpoint
        env:
          SUPPORT_CLEANUP_SECRET: ${{ secrets.SUPPORT_CLEANUP_SECRET }}
        run: |
          if [ -z "$SUPPORT_CLEANUP_SECRET" ]; then
            echo "SUPPORT_CLEANUP_SECRET is not set in repo secrets" >&2
            exit 1
          fi
          response=$(curl -sS -w "\n%{http_code}" \
            -X POST https://opendrone.be/api/support/cleanup \
            -H "Authorization: Bearer $SUPPORT_CLEANUP_SECRET" \
            -H "Content-Type: application/json")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "HTTP $status"
          echo "$body"
          if [ "$status" != "200" ]; then
            exit 1
          fi
