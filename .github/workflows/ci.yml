name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Build (with stub env)
        env:
          SESSION_SECRET: "ci-stub-secret-for-build-only"
          PUBLIC_STORE_DOMAIN: "example.myshopify.com"
          PUBLIC_STOREFRONT_API_TOKEN: "ci-stub"
          PUBLIC_STOREFRONT_ID: "0"
          PUBLIC_CHECKOUT_DOMAIN: "example.com"
          PUBLIC_CUSTOMER_ACCOUNT_API_CLIENT_ID: "ci-stub"
          PUBLIC_CUSTOMER_ACCOUNT_API_URL: "https://example.com"
          PRIVATE_STOREFRONT_API_TOKEN: "ci-stub"
          SHOP_ID: "0"
        run: npm run build
